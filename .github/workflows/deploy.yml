name: تشغيل بوت تلغرام

on:
  push:
    branches: [ main ]
  schedule:
    # يعيد التشغيل كل ساعة للتأكد من استمرارية العمل
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: إعداد Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: تثبيت المتطلبات
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: تشغيل البوت
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
      run: |
        python bot.py
      timeout-minutes: 55  # ينتهي قبل دقائق من إعادة التشغيل التلقائي
